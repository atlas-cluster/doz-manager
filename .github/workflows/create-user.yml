name: Create Production User

on:
  workflow_dispatch:
    inputs:
      user_name:
        description: 'Full name (e.g. Max Mustermann)'
        required: true
        type: string
      user_email:
        description: 'Email address'
        required: true
        type: string
      is_admin:
        description: 'Grant admin privileges?'
        required: false
        type: boolean
        default: false

jobs:
  create-user:
    name: Create User
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies & generate Prisma client
        run: |
          npm ci
          npx prisma generate

      - name: Prepare SSH (known_hosts + key)
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          JUMP_HOST="${{ secrets.JUMP_HOST }}"
          JUMP_PORT="${{ secrets.JUMP_PORT || 22 }}"
          DEPLOY_HOST="${{ secrets.DEPLOY_HOST }}"
          DEPLOY_PORT="${{ secrets.DEPLOY_PORT || 22 }}"

          timeout 10 ssh-keyscan -p "$JUMP_PORT" -H "$JUMP_HOST" >> ~/.ssh/known_hosts || echo "JUMP warn: retry later"
          timeout 10 ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts || echo "DEPLOY warn: retry later"

          chmod 600 ~/.ssh/known_hosts

      - name: Open SSH tunnel to database
        env:
          JUMP_HOST: ${{ secrets.JUMP_HOST }}
          JUMP_USER: ${{ secrets.JUMP_USER }}
          JUMP_PORT: ${{ secrets.JUMP_PORT || 22 }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: 3306
        run: |
          SSH_OPTS="-i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 -o ConnectionAttempts=3"

          echo "Opening tunnel -> $DB_HOST:$DB_PORT"
          ssh $SSH_OPTS -J "${JUMP_USER}@${JUMP_HOST}:${JUMP_PORT}" \
                -p $DEPLOY_PORT -fNT -L 3306:$DB_HOST:$DB_PORT \
                $DEPLOY_USER@$DEPLOY_HOST &
          echo $! > /tmp/ssh_tunnel.pid

          sleep 5

          for i in {1..12}; do
            if timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/3306' 2>/dev/null; then
              echo "Tunnel ready!"
              break
            fi
            echo "Waiting... $i/12"
            sleep 2
          done || { echo "::error::SSH tunnel failed to connect"; kill $(cat /tmp/ssh_tunnel.pid) 2>/dev/null; exit 1; }

      - name: Create user (password is auto-generated)
        env:
          DB_HOST: '127.0.0.1'
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_ROOT_USER: ${{ secrets.DB_ROOT_USER }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CREATE_USER_NAME: ${{ inputs.user_name }}
          CREATE_USER_EMAIL: ${{ inputs.user_email }}
          CREATE_USER_ADMIN: ${{ inputs.is_admin }}
        run: |
          echo "Creating user: ${CREATE_USER_NAME} <${CREATE_USER_EMAIL}> (admin: ${CREATE_USER_ADMIN})"
          npm run prisma:create-user

      - name: Cleanup SSH tunnel
        if: always()
        run: |
          if [ -f /tmp/ssh_tunnel.pid ]; then
            kill $(cat /tmp/ssh_tunnel.pid) 2>/dev/null || true
          fi
          SSH_OPTS="-i ~/.ssh/id_ed25519"
          ssh $SSH_OPTS -O exit ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 2>/dev/null || true
          echo "Cleanup done"
